name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & publish GitHub Release artifacts
  # (DMG, MSI, deb, AppImage)
  # ──────────────────────────────────────────────
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_target: ""
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libdbus-1-dev pkg-config

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (Developer ID for direct distribution)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AuthPilot ${{ github.ref_name }}"
          releaseBody: |
            ## AuthPilot ${{ github.ref_name }}

            ### Download
            - **macOS (Apple Silicon)**: `.dmg` (aarch64)
            - **macOS (Intel)**: `.dmg` (x86_64)
            - **Windows**: `.msi` installer
            - **Linux**: `.deb` / `.AppImage`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ──────────────────────────────────────────────
  # Job 2: Build & upload to Mac App Store
  # Builds arm64, signs with Apple Distribution,
  # packages as .pkg, uploads via xcrun notarytool
  # ──────────────────────────────────────────────
  appstore:
    runs-on: macos-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-appstore-${{ hashFiles('src-tauri/Cargo.lock') }}

      # Import Apple Distribution certificate (for signing the app)
      - name: Import Apple Distribution certificate
        env:
          APPSTORE_CERTIFICATE: ${{ secrets.APPSTORE_CERTIFICATE }}
          APPSTORE_CERTIFICATE_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPSTORE_CERTIFICATE" | base64 --decode > /tmp/distribution.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/distribution.p12 -k build.keychain -P "$APPSTORE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/distribution.p12

      # Import Mac Installer Distribution certificate (for signing the .pkg)
      - name: Import Installer certificate
        env:
          INSTALLER_CERTIFICATE: ${{ secrets.INSTALLER_CERTIFICATE }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          echo "$INSTALLER_CERTIFICATE" | base64 --decode > /tmp/installer.p12
          security import /tmp/installer.p12 -k build.keychain -P "$INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/installer.p12

      # Install provisioning profile
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/AuthPilot.provisionprofile

      # Build the app with Tauri (arm64 only, macOS 12.0+)
      - name: Build app for App Store
        env:
          APPLE_SIGNING_IDENTITY: "Apple Distribution: Mohamed Elbssir (UD29PDQT67)"
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          pnpm tauri build --target aarch64-apple-darwin

      # Embed provisioning profile & re-sign with entitlements
      - name: Prepare App Store bundle
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AuthPilot.app"
          cp ~/Library/MobileDevice/Provisioning\ Profiles/AuthPilot.provisionprofile "$APP_PATH/Contents/embedded.provisionprofile"
          xattr -cr "$APP_PATH"
          codesign --force --deep --sign "Apple Distribution: Mohamed Elbssir (UD29PDQT67)" \
            --entitlements src-tauri/Entitlements.plist \
            "$APP_PATH"

      # Create signed .pkg for App Store
      - name: Create App Store .pkg
        run: |
          APP_PATH="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/AuthPilot.app"
          productbuild --component "$APP_PATH" /Applications \
            --sign "3rd Party Mac Developer Installer: Mohamed Elbssir (UD29PDQT67)" \
            AuthPilot.pkg

      # Upload to App Store Connect
      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type macos \
            --file AuthPilot.pkg \
            --username "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}"

      # Attach .pkg to the GitHub Release as well
      - name: Upload .pkg to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: AuthPilot.pkg
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
